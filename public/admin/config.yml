backend:
  name: github
  repo: yasminshiraz-ai/yasmin-breakdown
  branch: main
  base_url: https://yasminbreakdown.com

# Allow editorial workflow (drafts → review → published)
publish_mode: editorial_workflow

# Where uploaded images are stored
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "authors"
    label: "Authors"
    label_singular: "Author"
    folder: "content/authors"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"

      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL identifier — used for /author/[slug]. Lowercase letters and hyphens only."
        pattern:
          - "^[a-z0-9-]+$"
          - "Lowercase letters, numbers, and hyphens only"

      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false
        hint: "Square crop recommended, minimum 160×160px."
        media_library:
          config:
            multiple: false

      - label: "Title"
        name: "title"
        widget: "string"
        required: false
        hint: "e.g. Founder, Yasmin Breakdown"

      - label: "Short Bio"
        name: "short_bio"
        widget: "text"
        required: false
        hint: "2–3 sentences — shown in the author box at the bottom of articles."

      - label: "Full Bio"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Longer bio shown on the /author/[slug] page. Supports markdown formatting."

      - label: "Credentials"
        name: "credentials"
        widget: "list"
        required: false
        allow_add: true
        hint: "e.g. Sociology & criminology background, Cold Case Files writer"
        field:
          name: credential
          label: Credential
          widget: string

      - label: "Social Links"
        name: "social_links"
        widget: "list"
        required: false
        fields:
          - label: "Platform"
            name: "platform"
            widget: "string"
            hint: "e.g. Instagram, Twitter, Facebook"
          - label: "URL"
            name: "url"
            widget: "string"

      - label: "Contact Email"
        name: "contact_email"
        widget: "string"
        required: false

  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    # Slug is auto-generated from the title field
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{category}} — {{date}}"
    sortable_fields: ["date", "title", "category"]
    view_filters:
      - label: "Sports"
        field: category
        pattern: "Sports"
      - label: "Music"
        field: category
        pattern: "Music"
      - label: "TV & Film"
        field: category
        pattern: "TV & Film"
      - label: "Relationships"
        field: category
        pattern: "Relationships"
      - label: "History"
        field: category
        pattern: "History"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The full article headline"

      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL-safe identifier — auto-generated from title. Only change if you need a custom URL."
        pattern:
          - "^[a-z0-9-]+$"
          - "Lowercase letters, numbers, and hyphens only"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Sports"
          - "Music"
          - "TV & Film"
          - "Relationships"
          - "History"

      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
        required: false
        hint: "Recommended: 1200×800px or wider. JPG or PNG."
        media_library:
          config:
            multiple: false

      - label: "Description / Dek"
        name: "description"
        widget: "text"
        hint: "1–2 sentence summary shown on cards and in meta tags"
        pattern:
          - "^.{20,300}$"
          - "Keep it between 20 and 300 characters"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Full article content. Use ## for section headers, **bold**, *italic*, > for blockquotes."

      - label: "YouTube Video URL"
        name: "videoUrl"
        widget: "string"
        required: false
        hint: "Optional: paste a full YouTube URL (e.g. https://www.youtube.com/watch?v=XXXXXX). Renders as a full-width embed in the article."
        pattern:
          - "^(https?://)?(www\\.)?(youtube\\.com|youtu\\.be)/.+$|^$"
          - "Must be a valid YouTube URL or leave blank"

      - label: "Featured Article (Homepage Hero)"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Check this to display the article as the full-width hero on the homepage. Only one article should be featured at a time."

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        allow_add: true
        hint: "Add tags like: Hip Hop, Black History, WNBA, Celebrity, Social Justice"
        field:
          name: tag
          label: Tag
          widget: string

      - label: "Author"
        name: "author"
        widget: "relation"
        collection: "authors"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        default: "yasmin-shiraz"
        required: false
        hint: "Defaults to Yasmin Shiraz if left blank."
