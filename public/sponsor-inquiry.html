<!DOCTYPE html>
<html>
<body>
<!-- Netlify build-time form detection for Next.js App Router -->
<form name="sponsor-inquiry" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="bot-field" />
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="text" name="company" />
  <input type="text" name="subject" />
  <select name="sponsorType">
    <option value="Sponsored Article">Sponsored Article</option>
    <option value="YouTube Integration">YouTube Integration</option>
    <option value="Podcast Sponsorship">Podcast Sponsorship</option>
    <option value="Newsletter Sponsorship">Newsletter Sponsorship</option>
    <option value="Social Media Campaign">Social Media Campaign</option>
    <option value="Full Brand Partnership">Full Brand Partnership</option>
    <option value="Other">Other</option>
  </select>
  <textarea name="message"></textarea>
  <button type="submit">Submit Sponsorship Inquiry</button>
</form>
</body>
</html>
